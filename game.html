<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riel Runner</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e1a;
    font-family: 'Press Start 2P', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }

  #game-canvas {
    display: block;
    image-rendering: pixelated;
    cursor: crosshair;
  }

  /* CRT overlay */
  #crt {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.10) 2px, rgba(0,0,0,0.10) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* ═══ TOUCH CONTROLS ═══ */
  #touch-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 20;
    pointer-events: none;
    user-select: none;
    -webkit-user-select: none;
  }

  #touch-overlay.active { display: block; }

  .t-btn {
    position: absolute;
    pointer-events: all;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', monospace;
    color: rgba(232,232,208,0.85);
    background: rgba(15,21,38,0.55);
    border: 2px solid rgba(245,196,0,0.35);
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.08s, border-color 0.08s;
  }

  .t-btn.pressed {
    background: rgba(245,196,0,0.25);
    border-color: rgba(245,196,0,0.8);
  }

  /* Left side — movement */
  #btn-left  { left: 14px;  bottom: 130px; width: 72px; height: 72px; font-size: 18px; }
  #btn-right { left: 100px; bottom: 130px; width: 72px; height: 72px; font-size: 18px; }
  #btn-jump  { left: 14px;  bottom: 214px; width: 72px; height: 72px; font-size: 18px; }

  /* Right side — shoot (big circle) */
  #btn-shoot {
    right: 24px;
    bottom: 100px;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 3px solid rgba(192,57,43,0.6);
    background: rgba(192,57,43,0.22);
    font-size: 11px;
    letter-spacing: 0.05em;
  }
  #btn-shoot.pressed {
    background: rgba(192,57,43,0.55);
    border-color: rgba(231,76,60,0.95);
  }

  /* Top right — dash + pause */
  #btn-dash {
    right: 90px;
    top: 14px;
    width: 60px;
    height: 44px;
    font-size: 7px;
    letter-spacing: 0.05em;
    border-color: rgba(34,85,204,0.5);
    background: rgba(34,85,204,0.2);
  }
  #btn-dash.pressed {
    background: rgba(34,85,204,0.5);
    border-color: rgba(34,85,204,0.9);
  }
  #btn-dash.cooldown {
    opacity: 0.4;
    border-color: rgba(100,100,120,0.4);
  }

  #btn-pause {
    right: 14px;
    top: 14px;
    width: 60px;
    height: 44px;
    font-size: 13px;
    border-color: rgba(245,196,0,0.4);
  }
  #btn-pause.pressed {
    background: rgba(245,196,0,0.25);
    border-color: rgba(245,196,0,0.9);
  }
</style>
<!-- Firebase (compat) scripts for multiplayer -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>
<canvas id="game-canvas"></canvas>
<div id="crt"></div>
<div id="multiplayer-banner" style="position:absolute;top:10px;left:10px;z-index:40;color:#f5c400;font-size:10px;display:none;background:rgba(0,0,0,0.4);padding:6px;border:2px solid rgba(245,196,0,0.12);">MP: <span id="mp-room">-</span> | Players: <span id="mp-count">0</span></div>

<!-- TOUCH OVERLAY -->
<div id="touch-overlay">
  <!-- Left side -->
  <div class="t-btn" id="btn-jump">▲</div>
  <div class="t-btn" id="btn-left">◄</div>
  <div class="t-btn" id="btn-right">►</div>
  <!-- Right side -->
  <div class="t-btn" id="btn-shoot">SHOOT</div>
  <!-- Top right -->
  <div class="t-btn" id="btn-dash">DASH</div>
  <div class="t-btn" id="btn-pause">⏸</div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════════════════════════════
const canvas = document.getElementById('game-canvas');
const ctx    = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const BASE_W = 800;
const BASE_H = 450;

function resizeCanvas() {
  const scaleX = window.innerWidth  / BASE_W;
  const scaleY = window.innerHeight / BASE_H;
  const scale  = Math.min(scaleX, scaleY);
  canvas.width  = BASE_W;
  canvas.height = BASE_H;
  canvas.style.width  = (BASE_W * scale) + 'px';
  canvas.style.height = (BASE_H * scale) + 'px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ═══════════════════════════════════════════════════════════════
//  LOAD CAMPAIGN + SETTINGS
// ═══════════════════════════════════════════════════════════════
let campaign;
try { campaign = JSON.parse(localStorage.getItem('activeCampaign')); } catch {}
if (!campaign) {
  campaign = {
    level: 1, riels: 0, hp: 150, maxHp: 150,
    lives: 3, gunDamage: 2, upgradeCount: 0,
    upgradeCost: 4, npcCount: 5, bossesBeaten: 0, name: 'DEBUG'
  };
}

let settings;
try { settings = JSON.parse(localStorage.getItem('rielrunner_settings')); } catch {}
if (!settings) settings = { autoAim: true, hpBars: true, damageNumbers: true };

// ─── MULTIPLAYER ROOM HANDLING (reads ?room=CODE and joins presence) ─────────────────
const urlParams = new URLSearchParams(window.location.search || '');
const MULTI_ROOM = urlParams.get('room');
let mpDb = null, mpUid = null, mpIsHost = false;
// multiplayer helpers
const otherPlayers = {}; // populated on host simulation and client snapshots
let inputsMap = {};

if (MULTI_ROOM) {
  try {
    // firebaseConfig copied from Firebase info.txt
    const firebaseConfig = {
      apiKey: "AIzaSyBu4N1LXy3dgnHS6yZKOdGzY4baby8fqvQ",
      authDomain: "riel-runner.firebaseapp.com",
      projectId: "riel-runner",
      storageBucket: "riel-runner.firebasestorage.app",
      messagingSenderId: "73958110392",
      appId: "1:73958110392:web:a8a8751968ff54b9d1f04d",
      measurementId: "G-EX5FSVV7DC"
    };

    if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseConfig);
    mpDb = firebase.database();

    // Sign in anonymously (if not already)
    firebase.auth().onAuthStateChanged(user => {
      if (user) {
        mpUid = user.uid;
        joinRoomPresence(MULTI_ROOM);
      } else {
        firebase.auth().signInAnonymously().catch(e => console.warn('FB auth err', e));
      }
    });

  } catch (e) {
    console.warn('Multiplayer init failed', e);
  }
}

function joinRoomPresence(code) {
  if (!mpDb || !mpUid) return;
  const playersRef = mpDb.ref('rooms/' + code + '/inGamePlayers');
  const myRef = playersRef.child(mpUid);
  myRef.set({ joinedAt: Date.now() });
  myRef.onDisconnect().remove();
  // remove any lingering input node on disconnect
  mpDb.ref('rooms/' + code + '/inputs/' + mpUid).onDisconnect().remove();

  // Update banner with players count
  playersRef.on('value', snap => {
    const obj = snap.val() || {};
    const keys = Object.keys(obj);
    const count = keys.length;
    const banner = document.getElementById('multiplayer-banner');
    const roomEl  = document.getElementById('mp-room');
    const countEl = document.getElementById('mp-count');
    if (banner && roomEl && countEl) {
      banner.style.display = 'block';
      roomEl.textContent = code;
      countEl.textContent = count;
    }
  });

  // Watch host flag to know if this client is host
  const hostRef = mpDb.ref('rooms/' + code + '/host');
  hostRef.on('value', snap => {
    const hostUid = snap.val();
    mpIsHost = (hostUid === mpUid);
  }, ()=>{});

  // Listen for snapshots (clients will apply snapshots)
  mpDb.ref('rooms/' + code + '/snapshot').on('value', snap => {
    const val = snap.val();
    if (!val) return;
    if (!mpIsHost) applySnapshot(val);
  });

  // Listen for inputs (host will process inputs into simulated other players)
  mpDb.ref('rooms/' + code + '/inputs').on('value', snap => {
    const val = snap.val() || {};
    if (mpIsHost) processInputsForHost(val);
  });

  // Listen for shop state — when host enters shop, everyone should go to shop.html?room=CODE
  mpDb.ref('rooms/' + code + '/inShop').on('value', snap => {
    const val = snap.val();
    const inShopPage = window.location.pathname.endsWith('shop.html');
    if (val === true) {
      // redirect all players (host and clients) to shop page if not already there
      if (!inShopPage) {
        window.location.href = 'shop.html?room=' + encodeURIComponent(code);
      }
      return;
    }
    // shop closed — if currently on shop page, redirect back to game
    if (val === false && inShopPage) {
      window.location.href = 'game.html?room=' + encodeURIComponent(code);
    }
  });
}

// Send input state to DB (for non-host clients)
function sendInputState(){
  if (!MULTI_ROOM || !mpDb || !mpUid) return;
  try {
    const short = {};
    // capture only relevant keys
    ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].forEach(k => { short[k]=!!keys[k]; });
    const p = { keys: short, ts: Date.now() };
    mpDb.ref('rooms/' + MULTI_ROOM + '/inputs/' + mpUid).set(p);
  } catch(e){ console.warn('sendInputState err', e); }
}

// Apply snapshot received from host (clients only)
function applySnapshot(snap){
  if (!snap) return;
  try {
    // basic campaign sync
    if (typeof snap.campaignLevel !== 'undefined') campaign.level = snap.campaignLevel;
    
    // Player authoritative values — always apply host snapshot so clients mirror host screen
    if (snap.player) {
      player.x = (typeof snap.player.x === 'number') ? snap.player.x : player.x;
      player.y = (typeof snap.player.y === 'number') ? snap.player.y : player.y;
      player.hp = typeof snap.player.hp === 'number' ? snap.player.hp : player.hp;
      player.maxHp = typeof snap.player.maxHp === 'number' ? snap.player.maxHp : player.maxHp;
      player.bullets = typeof snap.player.bullets === 'number' ? snap.player.bullets : player.bullets;
      player.lives = typeof snap.player.lives === 'number' ? snap.player.lives : player.lives;
      player.facingRight = !!snap.player.facingRight;
      player.animFrame = typeof snap.player.animFrame !== 'undefined' ? snap.player.animFrame : player.animFrame;
      player.gunFlash = typeof snap.player.gunFlash !== 'undefined' ? snap.player.gunFlash : player.gunFlash;
    }

    // Replace NPCs with snapshot (lightweight)
    if (Array.isArray(snap.npcs)){
      npcs.length = 0;
      for (const nn of snap.npcs){
        const obj = {
          x: nn.x || 0,
          y: nn.y || GROUND_Y - NPC_H,
          vy: 0,
          onGround: true,
          hp: typeof nn.hp === 'number' ? nn.hp : (nn.maxHp || 10),
          maxHp: typeof nn.maxHp === 'number' ? nn.maxHp : (nn.hp || 10),
          dead: !!nn.dead,
          deadTimer: nn.deadTimer || 0,
          animTick: nn.animTick || 0,
          animFrame: nn.animFrame || 0,
          touching: false,
          jumpCooldown: nn.jumpCooldown || 0,
          attackCooldown: nn.attackCooldown || 0,
          attackCooldownFrames: nn.attackCooldownFrames || (nn.isBoss ? BOSS_ATTACK_COOLDOWN_FRAMES : NPC_ATTACK_COOLDOWN_FRAMES),
          isBoss: !!nn.isBoss,
          isTank: !!nn.isTank,
          contactDamage: typeof nn.contactDamage === 'number' ? nn.contactDamage : (nn.isBoss ? BOSS_BASE_DMG : 0.5 * LVL),
          rielReward: nn.rielReward || 2,
          w: nn.w || (nn.isBoss ? NPC_W*2 : NPC_W),
          h: nn.h || (nn.isBoss ? NPC_H*2 : NPC_H)
        };
        npcs.push(obj);
      }
    }

    // Magazines
    if (Array.isArray(snap.magazines)){
      magazines.length = 0;
      for (const m of snap.magazines) magazines.push({ x:m.x, y:m.y, w:m.w||10, h:m.h||8, collected:!!m.collected });
    }

    // Powerups
    if (Array.isArray(snap.powerups)){
      powerups.length = 0;
      for (const p of snap.powerups) powerups.push({ x:p.x, y:p.y, w:p.w||12, h:p.h||10, type:p.type||'jump', collected:!!p.collected });
    }

    // Lasers
    if (Array.isArray(snap.lasers)){
      lasers.length = 0;
      for (const l of snap.lasers) lasers.push({ x:l.x, y:l.y, w:l.w, h:l.h||6, lastDamageFrame: frameCount - 999 });
    }

    // Bullets — clients need to see host-spawned bullets
    if (Array.isArray(snap.bullets)){
      bullets.length = 0;
      for (const b of snap.bullets) bullets.push({ x:b.x, y:b.y, dx:b.dx, dy:b.dy, alive: !!b.alive });
    }

    // Other players (clients) — simple representation
    if (Array.isArray(snap.otherPlayers)){
      // Replace local otherPlayers only on client side
      if (!mpIsHost) {
        // clear existing and rebuild
        // Note: local clients won't simulate other players' physics; they rely on snapshot positions
        const tmp = {};
        for (const op of snap.otherPlayers) {
          tmp[op.uid] = { x: op.x, y: op.y, hp: op.hp, bullets: op.bullets, lives: op.lives, facingRight: op.facingRight, animFrame: op.animFrame, gunFlash: op.gunFlash };
        }
        // assign into otherPlayers for rendering
        for (const k in otherPlayers) if (!tmp[k]) delete otherPlayers[k];
        for (const k in tmp) otherPlayers[k] = { ...otherPlayers[k], ...tmp[k] };
      }
    }

  } catch(e){ console.warn('applySnapshot err', e); }
}


// Host-side: inputs map and other players simulation

function processInputsForHost(snapshotVal){
  inputsMap = snapshotVal || {};
  const now = Date.now();
  for (const uid in inputsMap){
    if (uid === mpUid) continue;
    const dat = inputsMap[uid] || {};
    if (!otherPlayers[uid]){
      // spawn near host player
      otherPlayers[uid] = {
        uid: uid,
        x: Math.max(0, player.x - 120 + Math.random()*240),
        y: GROUND_Y - PLAYER_H,
        vx: 0, vy: 0, onGround: true,
        hp: player.maxHp, maxHp: player.maxHp, bullets: 20, lives:3,
        shootTimer: 0, facingRight: true,
        input: dat.keys || {}, lastSeen: dat.ts || now
      };
    } else {
      otherPlayers[uid].input = dat.keys || {};
      otherPlayers[uid].lastSeen = dat.ts || now;
    }
  }
}

function simulateOtherPlayers(){
  const now = Date.now();
  for (const uid in otherPlayers){
    const op = otherPlayers[uid];
    // remove stale players (no input for 20s)
    if (now - (op.lastSeen || now) > 20000){ delete otherPlayers[uid]; continue; }

    // Skip simulation if dead awaiting respawn
    if (op.dead) {
      if (!op.respawnTimer) op.respawnTimer = 180; // 3s
      op.respawnTimer--;
      if (op.respawnTimer <= 0) {
        if (op.lives > 0) {
          op.dead = false; op.hp = op.maxHp; op.respawnTimer = 0; op.x = Math.max(0, player.x - 80); op.y = GROUND_Y - PLAYER_H;
        }
      }
      continue;
    }

    const keysLocal = op.input || {};
    // horizontal
    if (keysLocal['ArrowLeft']) { op.vx = -MOVE_SPEED; op.facingRight = false; }
    else if (keysLocal['ArrowRight']) { op.vx = MOVE_SPEED; op.facingRight = true; }
    else op.vx = 0;
    // jump
    if (keysLocal['ArrowUp'] && op.onGround){ op.vy = JUMP_FORCE; op.onGround = false; }
    // simple gravity
    op.vy += GRAVITY; op.x += op.vx; op.y += op.vy;
    // world bounds
    if (op.x < 0) op.x = 0;
    if (op.x + PLAYER_W > LEVEL_WIDTH) op.x = LEVEL_WIDTH - PLAYER_W;
    // ground collision
    op.onGround = false;
    if (op.y + PLAYER_H >= GROUND_Y){ op.y = GROUND_Y - PLAYER_H; op.vy = 0; op.onGround = true; }
    for (const p of platforms){
      const prevBottom = op.y + PLAYER_H - op.vy; const curBottom = op.y + PLAYER_H;
      const inX = op.x + PLAYER_W > p.x && op.x < p.x + p.w;
      const crossTop = prevBottom <= p.y && curBottom >= p.y;
      if (inX && crossTop && op.vy >= 0){ op.y = p.y - PLAYER_H; op.vy = 0; op.onGround = true; }
    }
    // shooting with auto-aim (same as player)
    if (!op.shootTimer) op.shootTimer = 0;
    if (keysLocal['Space'] && op.shootTimer <= 0 && (op.bullets||0) > 0){
      const sx = op.facingRight ? op.x + PLAYER_W + 2 : op.x - 6;
      const sy = op.y + 10;
      
      // Auto-aim: find closest NPC
      let dx = op.facingRight ? 1 : -1, dy = 0;
      let closest = null, bestDist = Infinity;
      for (const n of npcs) {
        if (n.dead) continue;
        const d = Math.hypot(n.x - op.x, n.y - op.y);
        if (d < bestDist) { bestDist = d; closest = n; }
      }
      if (closest) {
        const tx = closest.x + 10 - sx;
        const ty = closest.y + 12 - sy;
        const len = Math.hypot(tx, ty) || 1;
        dx = tx / len; dy = ty / len;
      }
      
      bullets.push({ x: sx, y: sy, dx, dy, alive:true });
      op.gunFlash = 5;
      op.bullets = Math.max(0, (op.bullets||0) - 1);
      op.shootTimer = SHOOT_COOLDOWN;
    }
    if (op.shootTimer > 0) op.shootTimer--;

    // Collisions with NPCs — simple: if overlapping, apply contact damage per frame
    for (const n of npcs){
      if (n.dead) continue;
      const overlap = op.x < n.x + n.w && op.x + PLAYER_W > n.x && op.y < n.y + n.h && op.y + PLAYER_H > n.y;
      if (overlap) {
        op.hp -= n.contactDamage || (0.5 * LVL);
        if (op.hp <= 0) {
          op.lives = (op.lives || 1) - 1;
          if (op.lives > 0) {
            op.hp = op.maxHp;
            op.x = Math.max(0, player.x - 80);
          } else {
            op.dead = true; op.respawnTimer = 180; op.hp = 0;
          }
        }
      }
    }

    // Lasers damage
    for (const l of lasers){
      if (op.x < l.x + l.w && op.x + PLAYER_W > l.x && op.y < l.y + l.h && op.y + PLAYER_H > l.y) {
        op.hp -= LASER_DAMAGE_PCT * op.maxHp; // tick immediately in host sim
        if (op.hp <= 0) {
          op.lives = (op.lives || 1) - 1;
          if (op.lives > 0) { op.hp = op.maxHp; op.x = Math.max(0, player.x - 80); }
          else { op.dead = true; op.respawnTimer = 180; op.hp = 0; }
        }
      }
    }

  }
}

function drawOtherPlayers(){
  for (const uid in otherPlayers){
    const op = otherPlayers[uid];
    const sx = wp(op.x);
    if (sx < -40 || sx > BASE_W + 40) continue;

    // Draw pixel sprite similar to local player
    const bx = op.x;
    const by = op.y;
    const S  = PIXEL;
    const f  = !!op.facingRight;

    function pRemote(col, row, color) {
      const drawCol = f ? col : (8 - col);
      ctx.fillStyle = color;
      ctx.fillRect(wp(bx) + drawCol * S, by + row * S, S, S);
    }

    const skin    = '#f5c89a';
    const hair    = '#222222';
    const jacket  = '#2255cc';
    const boot    = '#3d2b1f';
    const gunC    = '#888870';
    const flash   = '#f5c400';

    // Head
    pRemote(2,0,hair); pRemote(3,0,hair); pRemote(4,0,hair);
    pRemote(1,1,skin); pRemote(2,1,skin); pRemote(3,1,skin); pRemote(4,1,skin); pRemote(5,1,hair);
    pRemote(1,2,skin); pRemote(2,2,skin); pRemote(3,2,'#111'); pRemote(4,2,skin); pRemote(5,2,skin);

    // Body
    for(let c=1;c<=5;c++){ pRemote(c,3,jacket); pRemote(c,4,jacket); }

    // Gun arm
    pRemote(6,3,skin); pRemote(7,3,gunC); pRemote(8,3,gunC);
    if (op.gunFlash && op.gunFlash > 0) { pRemote(9,3,flash); pRemote(9,2,flash); }

    // Legs animation: prefer op.animFrame if present, else derive from frameCount
    const lf = (typeof op.animFrame !== 'undefined') ? op.animFrame : Math.floor((frameCount / 8) % 3);
    if (lf === 0) {
      pRemote(2,5,jacket); pRemote(3,5,jacket); pRemote(4,5,jacket);
      pRemote(2,6,boot);   pRemote(4,6,boot);
      pRemote(2,7,boot);   pRemote(4,7,boot);
    } else if (lf === 1) {
      pRemote(2,5,jacket); pRemote(3,5,jacket); pRemote(4,5,jacket);
      pRemote(1,6,boot);   pRemote(3,6,boot);
      pRemote(1,7,boot);   pRemote(4,7,boot);
    } else {
      pRemote(2,5,jacket); pRemote(3,5,jacket); pRemote(4,5,jacket);
      pRemote(2,6,boot);   pRemote(4,6,boot);
      pRemote(3,7,boot);   pRemote(5,7,boot);
    }

    // Draw short name (uid) above head
    ctx.fillStyle = '#ffffff'; ctx.font = '6px "Press Start 2P", monospace';
    ctx.fillText(uid.substring(0,4), sx, by - 6);

    // HP bar
    if (settings.hpBars) {
      const bw = PLAYER_W + 8;
      ctx.fillStyle = '#c0392b'; ctx.fillRect(sx - 2, by - 10, bw, 4);
      ctx.fillStyle = '#2ecc71'; ctx.fillRect(sx - 2, by - 10, Math.max(0, bw * ((op.hp||0) / (op.maxHp||1))), 4);
    }
  }
}

// Cleanup on unload
window.addEventListener('beforeunload', () => {
  if (MULTI_ROOM && mpDb && mpUid) mpDb.ref('rooms/' + MULTI_ROOM + '/inGamePlayers/' + mpUid).remove();
});


// ═══════════════════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════════════════
const GRAVITY        = 0.55;
const JUMP_FORCE     = -12;
const MOVE_SPEED     = 3.5;
const GROUND_Y       = BASE_H - 60;   // y where ground surface is

let pauseMenuIndex = 0;

//  INPUT
// ═══════════════════════════════════════════════════════════════
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space')      e.preventDefault();
  if (e.code === 'ArrowUp')    e.preventDefault();
  if (e.code === 'ArrowDown')  e.preventDefault();
  if (e.code === 'Escape') {
    e.preventDefault();
    if (gameState === 'playing') {
      gameState = 'paused';
      pauseMenuIndex = 0;
    } else if (gameState === 'paused') {
      gameState = 'playing';
    }
  }

  // Send input state to host when in multiplayer (non-host clients)
  if (typeof MULTI_ROOM !== 'undefined' && MULTI_ROOM && typeof mpDb !== 'undefined' && mpDb && !mpIsHost && typeof mpUid !== 'undefined' && mpUid) {
    sendInputState();
  }
});
window.addEventListener('keyup',  e => { keys[e.code] = false; if (typeof MULTI_ROOM !== 'undefined' && MULTI_ROOM && typeof mpDb !== 'undefined' && mpDb && !mpIsHost && typeof mpUid !== 'undefined' && mpUid) sendInputState(); });

let mouseX = 0, mouseY = 0;
canvas.addEventListener('mousemove', e => {
  const rect  = canvas.getBoundingClientRect();
  const scaleX = BASE_W / rect.width;
  const scaleY = BASE_H / rect.height;
  mouseX = (e.clientX - rect.left) * scaleX;
  mouseY = (e.clientY - rect.top)  * scaleY;
});

let mouseDown = false;
canvas.addEventListener('mousedown', e => { if (e.button === 0) mouseDown = true; });
canvas.addEventListener('mouseup',   e => { if (e.button === 0) mouseDown = false; });

// ═══════════════════════════════════════════════════════════════
//  LASERS (obstacles)
// ═══════════════════════════════════════════════════════════════
const lasers = [];
const LASER_DAMAGE_PCT = 0.10;     // 10% of max HP per tick
const LASER_TICK_FRAMES = 30;      // every 0.5s at 60fps

function generateLasers() {
  lasers.length = 0;
  // Spawn 2-4 lasers per level on platforms or above ground
  const laserCount = 2 + Math.floor(Math.random() * 3);
  for (let i = 0; i < laserCount; i++) {
    let x, y;
    // 70% chance on a platform, 30% at ground level
    if (platforms.length > 0 && Math.random() < 0.7) {
      const p = platforms[Math.floor(Math.random() * platforms.length)];
      x = p.x;
      y = p.y - 12; // slightly above platform
    } else {
      x = 600 + Math.random() * (LEVEL_WIDTH - 1200);
      y = GROUND_Y - 20;
    }
    const w = 100 + Math.random() * 150; // variable width
    lasers.push({ x, y, w, h: 6, lastDamageFrame: -LASER_TICK_FRAMES });
  }
}

function updateLasers() {
  for (const laser of lasers) {
    if (player.dead) continue;
    const overlap =
      player.x < laser.x + laser.w &&
      player.x + PLAYER_W > laser.x &&
      player.y < laser.y + laser.h &&
      player.y + PLAYER_H > laser.y;
    if (overlap) {
      // 0.5 contact damage per frame
      damagePlayer(0.5);
      // 10% max HP tick every 0.5s
      if (frameCount - laser.lastDamageFrame >= LASER_TICK_FRAMES) {
        const dmg = player.maxHp * LASER_DAMAGE_PCT;
        damagePlayer(dmg);
        spawnDmgNumber(player.x, player.y - 12, dmg, '#e74c3c');
        laser.lastDamageFrame = frameCount;
      }
    }
  }
}

function drawLasers() {
  for (const laser of lasers) {
    const sx = wp(laser.x);
    if (sx > BASE_W + 40 || sx < -40) continue;
    const pulse = Math.sin(frameCount * 0.1) * 0.3 + 0.7;
    // Outer glow
    ctx.fillStyle = `rgba(255,50,50,${pulse * 0.5})`;
    ctx.fillRect(sx - 2, laser.y - 2, laser.w + 4, laser.h + 4);
    // Core beam
    ctx.fillStyle = `rgba(255,80,80,${pulse * 0.9})`;
    ctx.fillRect(sx, laser.y, laser.w, laser.h);
    // Bright centre line
    ctx.fillStyle = `rgba(255,220,220,${pulse})`;
    ctx.fillRect(sx, laser.y + 2, laser.w, laser.h - 4);
    // End caps (pixel art style)
    ctx.fillStyle = '#ff3232';
    ctx.fillRect(sx - 3, laser.y - 1, 5, laser.h + 2);
    ctx.fillRect(sx + laser.w - 2, laser.y - 1, 5, laser.h + 2);
  }
}

function generatePlatforms() {
  const plats = [];
  const spacing = 320;
  for (let i = 1; i * spacing < LEVEL_WIDTH - 400; i++) {
    const x = i * spacing + Math.random() * 80 - 40;
    const y = GROUND_Y - 70 - Math.random() * 60;
    const w = 80 + Math.random() * 60;
    plats.push({ x, y, w, h: 14 });
  }
  return plats;
}
const platforms = generatePlatforms();

// ═══════════════════════════════════════════════════════════════
//  PLAYER PHYSICS + MOVEMENT
// ═══════════════════════════════════════════════════════════════
function updatePlayer() {
  if (player.dead) {
    player.respawnTimer--;
    if (player.respawnTimer <= 0) respawnPlayer();
    return;
  }

  // If connected to a multiplayer room and NOT the host, do not locally simulate inputs.
  // The client relies on host snapshots to update authoritative state.
  if (typeof MULTI_ROOM !== 'undefined' && MULTI_ROOM && typeof mpDb !== 'undefined' && mpDb && !mpIsHost) {
    // Keep camera centered on the (authoritative) player position and tick power timers so UI remains smooth.
    camX = player.x - BASE_W * 0.35;
    camX = Math.max(0, Math.min(LEVEL_WIDTH - BASE_W, camX));
    if (player.jumpPowerTimer > 0) { player.jumpPowerTimer--; if (player.jumpPowerTimer <= 0) player.jumpMult = 1; }
    if (player.speedPowerTimer > 0) { player.speedPowerTimer--; if (player.speedPowerTimer <= 0) player.speedMult = 1; }
    return;
  }

  // Horizontal
  let moving = false;
  if (keys['ArrowLeft']) {
    player.vx = -MOVE_SPEED * (player.speedMult || 1);
    player.facingRight = false;
    moving = true;
  } else if (keys['ArrowRight']) {
    player.vx = MOVE_SPEED * (player.speedMult || 1);
    player.facingRight = true;
    moving = true;
  } else {
    player.vx = 0;
  }

  // Jump — ArrowUp only, Space is shoot
  if (keys['ArrowUp'] && player.onGround) {
    player.vy = JUMP_FORCE * (player.jumpMult || 1);
    player.onGround = false;
  }

  // Dash — ArrowDown triggers dash in facing direction
  if (keys['ArrowDown'] && player.dashCooldown <= 0 && !player.isDashing) {
    player.isDashing = true;
    player.dashTimer  = DASH_DURATION;
    player.dashVx     = player.facingRight ? DASH_DISTANCE / DASH_DURATION : -DASH_DISTANCE / DASH_DURATION;
    player.dashCooldown = DASH_COOLDOWN;
    keys['ArrowDown'] = false; // consume key so it doesn't retrigger
  }

  // Handle active dash
  if (player.isDashing) {
    player.dashTimer--;
    player.vx = player.dashVx;
    if (player.dashTimer <= 0) {
      player.isDashing = false;
      player.vx = 0;
    }
  }

  // Dash cooldown tick
  if (player.dashCooldown > 0) player.dashCooldown--;

  // Gravity
  player.vy += GRAVITY;
  player.x  += player.vx;
  player.y  += player.vy;

  // World bounds (can't go left of start, can't go past end)
  if (player.x < 0) player.x = 0;
  if (player.x + PLAYER_W > LEVEL_WIDTH) player.x = LEVEL_WIDTH - PLAYER_W;

  // Ground collision
  player.onGround = false;
  if (player.y + PLAYER_H >= GROUND_Y) {
    player.y = GROUND_Y - PLAYER_H;
    player.vy = 0;
    player.onGround = true;
  }

  // Platform collision (top only)
  for (const p of platforms) {
    if (
      player.vx >= 0 || true // check all platforms
    ) {
      const prevBottom = player.y + PLAYER_H - player.vy;
      const curBottom  = player.y + PLAYER_H;
      const inX = player.x + PLAYER_W > p.x && player.x < p.x + p.w;
      const crossTop = prevBottom <= p.y && curBottom >= p.y;
      if (inX && crossTop && player.vy >= 0) {
        player.y = p.y - PLAYER_H;
        player.vy = 0;
        player.onGround = true;
      }
    }
  }

  // Animate legs
  if (moving && player.onGround) {
    player.animTick++;
    if (player.animTick >= 8) { player.animTick = 0; player.animFrame = (player.animFrame + 1) % 3; }
  } else if (!moving) {
    player.animFrame = 0;
  }

  // Timers
  if (player.shootTimer > 0) player.shootTimer--;
  if (player.gunFlash   > 0) player.gunFlash--;
  if (player.hitFlash   > 0) player.hitFlash--;

  // Shooting
  const wantShoot = keys['Space'] || mouseDown;
  if (wantShoot && player.shootTimer <= 0) {
    firePlayerBullet();
    player.shootTimer = SHOOT_COOLDOWN;
  }

  // Camera: keep player centred-ish
  camX = player.x - BASE_W * 0.35;
  camX = Math.max(0, Math.min(LEVEL_WIDTH - BASE_W, camX));

  // Power timers tick
  if (player.jumpPowerTimer > 0) {
    player.jumpPowerTimer--;
    if (player.jumpPowerTimer <= 0) player.jumpMult = 1;
  }
  if (player.speedPowerTimer > 0) {
    player.speedPowerTimer--;
    if (player.speedPowerTimer <= 0) player.speedMult = 1;
  }
}

// ═══════════════════════════════════════════════════════════════
//  BULLETS
// ═══════════════════════════════════════════════════════════════
const bullets = [];
// Magazines (spawned on boss levels) — give player +5 bullets when picked up
const magazines = [];

// Powerups: jump double-height and speed boost
const powerups = []; // each: {x,y,w,h,type:'jump'|'speed',collected:false}
const JUMP_POWER_MULT = 2;
const JUMP_POWER_DURATION_FRAMES = 30 * 60; // 30s
const SPEED_POWER_MULT = 3;
const SPEED_POWER_DURATION_FRAMES = 15 * 60; // 15s

// Player power timers
player.jumpMult = 1;
player.jumpPowerTimer = 0; // frames
player.speedMult = 1;
player.speedPowerTimer = 0; // frames


function firePlayerBullet() {
  // Don't allow firing if out of bullets
  if (!player.bullets || player.bullets <= 0) {
    showToast('OUT OF BULLETS!');
    // If already at 0, trigger life loss
    if ((player.bullets || 0) <= 0) {
      killPlayer();
    }
    return;
  }

  // Consume one bullet
  player.bullets = Math.max(0, player.bullets - 1);

  const startX = player.facingRight
    ? player.x + PLAYER_W + 2
    : player.x - 6;
  const startY = player.y + 10;

  let dx = 1, dy = 0;

  if (settings.autoAim) {
    // Find closest NPC
    let closest = null, bestDist = Infinity;
    for (const n of npcs) {
      if (n.dead) continue;
      const d = Math.hypot(n.x - player.x, n.y - player.y);
      if (d < bestDist) { bestDist = d; closest = n; }
    }
    if (closest) {
      const tx = closest.x + 10 - startX;
      const ty = closest.y + 12 - startY;
      const len = Math.hypot(tx, ty) || 1;
      dx = tx / len; dy = ty / len;
    } else {
      dx = player.facingRight ? 1 : -1;
    }
  } else {
    // Mouse aim — convert mouse to world coords
    const worldMouseX = mouseX + camX;
    const worldMouseY = mouseY;
    const tx = worldMouseX - startX;
    const ty = worldMouseY - startY;
    const len = Math.hypot(tx, ty) || 1;
    dx = tx / len; dy = ty / len;
  }

  bullets.push({ x: startX, y: startY, dx, dy, alive: true });
  player.gunFlash = 5;

  // Gunshot sound
  playGunshot();

  // If bullets just hit 0, trigger a life loss
  if (player.bullets <= 0) {
    showToast('OUT OF BULLETS!');
    killPlayer();
  }
}

function updateBullets() {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];

    const prevX = b.x;
    const prevY = b.y;
    const stepX = b.dx * BULLET_SPEED;
    const stepY = b.dy * BULLET_SPEED;
    const steps = Math.max(1, Math.ceil(Math.hypot(stepX, stepY) / PIXEL));

    let removed = false;
    for (let s = 1; s <= steps; s++) {
      const t = s / steps;
      const nx = prevX + stepX * t;
      const ny = prevY + stepY * t;

      // Check platform collision (solid blocks)
      let hitPlatform = false;
      for (const p of platforms) {
        if (nx > p.x && nx < p.x + p.w && ny > p.y && ny < p.y + p.h) {
          hitPlatform = true;
          break;
        }
      }

      if (hitPlatform) {
        // spawn small impact effect
        rielParticles.push({ x: nx, y: ny, vx: (Math.random()-0.5)*1.5, vy: -Math.random()*1.5, life: 18 });
        bullets.splice(i, 1);
        removed = true;
        break;
      }

      // Advance bullet
      b.x = nx;
      b.y = ny;
    }

    if (removed) continue;

    // Remove bullets as soon as they leave the viewport (prevent camping)
    const leftBound = camX - 10;
    const rightBound = camX + BASE_W + 10;
    if (b.x < leftBound || b.x > rightBound || b.y < 0 || b.y > BASE_H || !b.alive) {
      bullets.splice(i, 1);
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  NPC STATS (scale with level)
// ═══════════════════════════════════════════════════════════════
const LVL         = campaign.level || 1;
// NPC scaling per request:
// HP: +1 per level (cleaner). Level 1 => 10 HP, Level 99 => ~108 HP
const NPC_HP      = 10 + Math.max(0, LVL - 1) * 1;
// Damage: +0.5 per level. Level 1 => 0.5 dmg, Level 99 => ~49.5 dmg
const NPC_DMG_CONTACT = 0.5 * LVL; // per-frame contact damage (scales with level)
// Slightly slower NPCs for more player reaction time
const NPC_SPEED   = MOVE_SPEED * 1.1; // NPCs 10% faster than player
// Attack cooldowns (frames; assuming ~60fps)
const NPC_ATTACK_COOLDOWN_FRAMES = Math.round(0.2 * 60); // ~12 frames (0.2s)
const BOSS_ATTACK_COOLDOWN_FRAMES = Math.round(0.1 * 60); // ~6 frames (0.1s)
// Cap NPC count to avoid extreme overcrowding at very late levels
const NPC_COUNT   = Math.min(Math.max(5, campaign.npcCount), 23);
// Boss scaling constants
const BOSS_BASE_HP = 200;
const BOSS_HP_PER  = 75;
const BOSS_BASE_DMG = 5;
const BOSS_DMG_PER  = 8;

// ═══════════════════════════════════════════════════════════════
//  NPC ARRAY + SPAWN
// ═══════════════════════════════════════════════════════════════
const npcs = [];
const NPC_W = 18, NPC_H = 24;

function spawnNPCs() {
  npcs.length = 0;
  magazines.length = 0; // clear any previous magazines

  // If this is a boss level (10,20,...,100), spawn a single boss and magazines
  if (campaign.level > 0 && campaign.level % 10 === 0) {
    const bossIndex = Math.floor(campaign.level / 10);
    const bossHp = BOSS_BASE_HP + (bossIndex - 1) * BOSS_HP_PER;
    const bossDmg = BOSS_BASE_DMG + (bossIndex - 1) * BOSS_DMG_PER;
    const wx = LEVEL_WIDTH - 400 + (Math.random() * 80 - 40);
    npcs.push(makeNPC(wx, true, bossHp, bossDmg));

    // Spawn magazines around level — try to place on platforms first
    const magCount = 6;
    for (let i = 0; i < magCount; i++) {
      let mx, my;
      if (platforms.length > 0 && Math.random() > 0.25) {
        const p = platforms[Math.floor(Math.random() * platforms.length)];
        mx = p.x + Math.max(8, Math.random() * (p.w - 12));
        my = p.y - 8;
      } else {
        mx = 600 + Math.random() * (LEVEL_WIDTH - 1200);
        my = GROUND_Y - 12;
      }
      magazines.push({ x: mx, y: my, w: 10, h: 8, collected: false });
    }

    // Start boss levels with limited bullets
    player.bullets = 20;
    return;
  }

  // Spread NPCs evenly — roughly 1 tank per 4 normal NPCs
  const zone = (LEVEL_WIDTH - 400) / NPC_COUNT;
  for (let i = 0; i < NPC_COUNT; i++) {
    const wx = 500 + i * zone + Math.random() * (zone * 0.6);
    const isTank = (i % 4 === 3); // every 4th NPC is a tank
    npcs.push(makeNPC(wx, false, null, null, isTank));
  }

  // Start normal levels with limited bullets
  player.bullets = 20;
}

function makeNPC(wx, isBoss = false, customHp = null, customDmg = null, isTank = false) {
  const lvlNow = campaign.level || 1;
  const dynamicNpcHp = 10 + Math.max(0, lvlNow - 1) * 1;
  const tankHp       = dynamicNpcHp * 3;  // 3x normal HP
  const hpBase = isBoss
    ? (customHp || (BOSS_BASE_HP + (Math.floor(lvlNow / 10) - 1) * BOSS_HP_PER))
    : isTank ? tankHp : dynamicNpcHp;
  const dmgBase = isBoss
    ? (customDmg || (BOSS_BASE_DMG + (Math.floor(lvlNow / 10) - 1) * BOSS_DMG_PER))
    : (0.5 * lvlNow); // tanks deal same contact damage as normals

  const w = isBoss ? NPC_W * 2 : isTank ? Math.round(NPC_W * 1.5) : NPC_W;
  const h = isBoss ? NPC_H * 2 : isTank ? Math.round(NPC_H * 1.5) : NPC_H;
  const y = GROUND_Y - h;

  return {
    x: wx,
    y: y,
    vy: 0,
    onGround: true,
    hp: hpBase,
    maxHp: hpBase,
    dead: false,
    deadTimer: 0,
    animTick: 0,
    animFrame: 0,
    touching: false,
    jumpCooldown: 0,
    attackCooldown: 0,
    attackCooldownFrames: isBoss ? BOSS_ATTACK_COOLDOWN_FRAMES : NPC_ATTACK_COOLDOWN_FRAMES,
    isBoss: !!isBoss,
    isTank: !!isTank,
    contactDamage: dmgBase,
    rielReward: isTank ? 5 : 2,  // tanks worth 5 Riels
    w: w,
    h: h
  };
}

spawnNPCs();

// ═══════════════════════════════════════════════════════════════
//  DAMAGE NUMBERS
// ═══════════════════════════════════════════════════════════════
const dmgNumbers = [];

function spawnDmgNumber(wx, y, amount, color) {
  if (!settings.damageNumbers) return;
  dmgNumbers.push({ x: wx, y, amount: Math.ceil(amount), color, life: 45, vy: -1.2 });
}

function updateDrawDmgNumbers() {
  for (let i = dmgNumbers.length - 1; i >= 0; i--) {
    const d = dmgNumbers[i];
    d.y  += d.vy;
    d.vy *= 0.94;
    d.life--;
    const alpha = Math.min(1, d.life / 20);
    ctx.globalAlpha = alpha;
    ctx.fillStyle   = d.color;
    ctx.font        = '6px "Press Start 2P", monospace';
    // isText = riel gain label, otherwise show damage
    const label = d.isText ? ('+' + d.amount) : ('-' + d.amount);
    ctx.fillText(label, wp(d.x), d.y);
    ctx.globalAlpha = 1;
    if (d.life <= 0) dmgNumbers.splice(i, 1);
  }
}

// ═══════════════════════════════════════════════════════════════
//  RIEL PARTICLES
// ═══════════════════════════════════════════════════════════════
const rielParticles = [];

function spawnRielParticles(wx, y) {
  for (let i = 0; i < 5; i++) {
    rielParticles.push({
      x: wx + Math.random() * 12,
      y: y  + Math.random() * 8,
      vx: (Math.random() - 0.5) * 2.5,
      vy: -Math.random() * 3 - 1,
      life: 50,
    });
  }
}

function updateDrawRielParticles() {
  for (let i = rielParticles.length - 1; i >= 0; i--) {
    const p = rielParticles[i];
    p.x  += p.vx; p.y += p.vy; p.vy += 0.18;
    p.life--;
    ctx.globalAlpha = p.life / 50;
    ctx.fillStyle   = '#f5c400';
    ctx.fillRect(wp(p.x), p.y, PIXEL, PIXEL);
    ctx.globalAlpha = 1;
    if (p.life <= 0) rielParticles.splice(i, 1);
  }
}

// ═══════════════════════════════════════════════════════════════
//  NPC UPDATE
// ═══════════════════════════════════════════════════════════════
function updateNPCs() {
  for (const n of npcs) {
    if (n.dead) {
      n.deadTimer++;
      continue;
    }

    // Decrement attack cooldown
    if (n.attackCooldown > 0) n.attackCooldown--;

    // Active when on-screen — pursue immediately
    const screenX = wp(n.x);
    if (screenX < BASE_W + 40 && screenX > -80) {
      const dir = (player.x + PLAYER_W / 2) < (n.x + n.w / 2) ? -1 : 1;
      const gap = (player.x + PLAYER_W / 2) - (n.x + n.w / 2);
      const speed = n.isBoss ? MOVE_SPEED : n.isTank ? NPC_SPEED * 0.45 : NPC_SPEED;
      if (Math.abs(gap) > n.w * 0.6) {
        n.x += dir * speed;
      }

      // Attempt to jump toward player or onto a platform in front
      if (n.onGround && n.jumpCooldown <= 0) {
        // If player is noticeably higher, try a jump
        // Jump with same force as the player when needed
        if (player.y + 2 < n.y - 12 && Math.abs(gap) < 220) {
          n.vy = JUMP_FORCE; // match player's jump height
          n.onGround = false;
          n.jumpCooldown = 40;
        } else {
          // Look for a platform slightly ahead to jump onto
          const aheadX = n.x + dir * 48;
          // Compute NPC maximum reachable rise from a jump (kinematic)
          const jumpApex = (Math.abs(JUMP_FORCE) * Math.abs(JUMP_FORCE)) / (2 * GRAVITY);
          for (const p of platforms) {
            if (aheadX + n.w > p.x && aheadX < p.x + p.w) {
              const heightDiff = n.y - p.y; // positive if platform is above NPC
              if (p.y < n.y && heightDiff <= jumpApex + 8) {
                // Platform is reachable — perform full player jump
                n.vy = JUMP_FORCE;
                n.onGround = false;
                n.jumpCooldown = 40;
                break;
              }
            }
          }
        }
      }
    }

    // Vertical physics
    if (!n.onGround) {
      n.vy += GRAVITY * 0.9; // slightly lighter gravity for NPCs
      n.y += n.vy;
    }

    // Platform / ground collision for NPCs
    n.onGround = false;
    if (n.y + n.h >= GROUND_Y) {
      n.y = GROUND_Y - n.h;
      n.vy = 0;
      n.onGround = true;
    }
    for (const p of platforms) {
      const prevBottom = n.y + n.h - n.vy;
      const curBottom = n.y + n.h;
      const inX = n.x + n.w > p.x && n.x < p.x + p.w;
      const crossTop = prevBottom <= p.y && curBottom >= p.y;
      if (inX && crossTop && n.vy >= 0) {
        n.y = p.y - n.h;
        n.vy = 0;
        n.onGround = true;
      }
    }

    // Timers
    if (n.jumpCooldown > 0) n.jumpCooldown--;

    // Animate
    n.animTick++;
    if (n.animTick >= 12) { n.animTick = 0; n.animFrame = (n.animFrame + 1) % 2; }

    // ── Collision with player — contact damage (with per-NPC cooldown) ──
    n.touching = false;
    if (!player.dead) {
      const overlap =
        player.x < n.x + n.w &&
        player.x + PLAYER_W > n.x &&
        player.y < n.y + n.h &&
        player.y + PLAYER_H > n.y;

      if (overlap) {
        n.touching = true;
        if (n.attackCooldown <= 0) {
          damagePlayer(n.contactDamage);
          n.attackCooldown = n.attackCooldownFrames;
        }
      }
    }

    // ── Bullet collision ──
    for (let bi = bullets.length - 1; bi >= 0; bi--) {
      const b = bullets[bi];
      const hit =
        b.x > n.x && b.x < n.x + n.w &&
        b.y > n.y && b.y < n.y + n.h;
      if (hit) {
        bullets.splice(bi, 1);
        n.hp -= player.gunDamage;
        spawnDmgNumber(n.x, n.y - 4, player.gunDamage, '#f5c400');
        if (n.hp <= 0) killNPC(n);
        break;
      }
    }
  }
}

function killNPC(n) {
  n.dead      = true;
  n.deadTimer = 0;
  const reward = n.rielReward || 2;
  campaign.riels += reward;
  spawnRielParticles(n.x, n.y);
  if (settings.damageNumbers) {
    dmgNumbers.push({ x: n.x, y: n.y - 14, amount: reward + ' KHR', color: '#2ecc71', life: 55, vy: -1.0, isText: true });
  }

  // Reward bullets for kills (cap to 20)
  player.bullets = Math.min(20, (player.bullets || 0) + 5);
  // Show pickup text
  if (settings.damageNumbers) {
    dmgNumbers.push({ x: n.x, y: n.y - 4, amount: '+5 BUL', color: '#f5c400', life: 50, vy: -1.0, isText: true });
  }

  playDeathSound();

  // Boss-specific rewards/effects
  if (n.isBoss) {
    campaign.bossesBeaten = (campaign.bossesBeaten || 0) + 1;
    campaign.npcCount = (campaign.npcCount || 5) + 2;      // +2 NPCs per boss beaten
    campaign.upgradeCost = (campaign.upgradeCost || 4) + 5; // +5 upgrade cost
    // Random max HP bonus between 5 and 10
    const hpBonus = Math.floor(Math.random() * 6) + 5;
    campaign.maxHp = (campaign.maxHp || player.maxHp) + hpBonus;
    player.maxHp += hpBonus;
    player.hp = Math.min(player.maxHp, player.hp + hpBonus);
  }

  checkLevelClear();
}

function checkLevelClear() {
  const allDead = npcs.every(n => n.dead);
  if (!allDead) return;
  if (gameState !== 'playing') return;

  if (campaign.level >= 100) {
    gameState  = 'you_win';
    stateTimer = 0;
  } else if (campaign.level % 10 === 0) {
    gameState  = 'boss_slayed';
    stateTimer = 0;
  } else {
    gameState  = 'level_clear';
    stateTimer = 0;
  }
}

// Handle magazine pickups (called each frame)
function updateMagazines() {
  if (!magazines || magazines.length === 0) return;
  for (let i = magazines.length - 1; i >= 0; i--) {
    const m = magazines[i];
    if (m.collected) continue;
    // Simple overlap check with player
    if (
      player.x < m.x + m.w &&
      player.x + PLAYER_W > m.x &&
      player.y < m.y + m.h &&
      player.y + PLAYER_H > m.y
    ) {
      m.collected = true;
      // Give bullets and cap to max (20)
      player.bullets = Math.min(20, (player.bullets || 0) + 5);
      // Visual
      dmgNumbers.push({ x: m.x, y: m.y - 8, amount: '+5 BUL', color: '#f5c400', life: 50, vy: -1.0, isText: true });
      playPickupSound && playPickupSound();
    }
  }
}

// Handle powerup pickups
function updatePowerups() {
  if (!powerups || powerups.length === 0) return;
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    if (p.collected) continue;
    if (
      player.x < p.x + p.w &&
      player.x + PLAYER_W > p.x &&
      player.y < p.y + p.h &&
      player.y + PLAYER_H > p.y
    ) {
      p.collected = true;
      if (p.type === 'jump') {
        player.jumpMult = JUMP_POWER_MULT;
        player.jumpPowerTimer = JUMP_POWER_DURATION_FRAMES;
        dmgNumbers.push({ x: p.x, y: p.y - 8, amount: 'JUMP x2', color: '#8e44ad', life: 60, vy: -1.2, isText: true });
      } else {
        player.speedMult = SPEED_POWER_MULT;
        player.speedPowerTimer = SPEED_POWER_DURATION_FRAMES;
        dmgNumbers.push({ x: p.x, y: p.y - 8, amount: 'SPD x3', color: '#27ae60', life: 60, vy: -1.2, isText: true });
      }
      playPickupSound && playPickupSound();
    }
  }
}

function goToShop() {
  // Sync campaign state
  campaign.hp      = Math.ceil(player.hp);
  campaign.maxHp   = player.maxHp;
  campaign.lives   = player.lives;
  campaign.gunDamage  = player.gunDamage;
  // upgradeCost already tracked in campaign
  localStorage.setItem('activeCampaign', JSON.stringify(campaign));
  // Sync best riels
  const best = parseInt(localStorage.getItem('bestRiels') || '0');
  if (campaign.riels > best) localStorage.setItem('bestRiels', campaign.riels);
  window.location.href = 'shop.html';
}

function goToVictory() {
  gameState  = 'you_win';
  stateTimer = 0;
}

// ═══════════════════════════════════════════════════════════════
//  PLAYER DAMAGE
// ═══════════════════════════════════════════════════════════════
function damagePlayer(amount, isTick) {
  if (player.dead) return;
  player.hp -= amount;
  player.hitFlash = 20;
  if (player.hp <= 0) {
    player.hp = 0;
    killPlayer();
  }
}

// ═══════════════════════════════════════════════════════════════
//  DRAW NPCs
// ═══════════════════════════════════════════════════════════════
function drawNPCs() {
  for (const n of npcs) {
    const sx = wp(n.x);
    if (sx > BASE_W + 40 || sx < -40) continue;

    if (n.dead) {
      // Show skull for 2 seconds (120 frames)
      if (n.deadTimer < 120) {
        drawSkull(n.x, n.y);
      }
      continue;
    }

    const by = n.y;

    if (n.isBoss) {
      // Boss: draw scaled-up pixel art (2x the NPC pixels)
      const S = PIXEL * 2; // scale per-pixel for boss
      const body = n.touching ? '#e74c3c' : '#2e86de'; // blue boss, flash red when touching
      const eye  = '#ffffff';
      const boot = '#11131a';

      // Helper: draw a boss pixel at (col,row) in the 6x7 layout scaled by S
      function bep(col, row, color) {
        ctx.fillStyle = color;
        ctx.fillRect(sx + col * S, by + row * S, S, S);
      }

      // Simple 6x7 boss sprite (based on NPC but larger)
      // Row 0
      bep(1,0,body); bep(2,0,body); bep(3,0,body); bep(4,0,body);
      // Row 1
      bep(0,1,body); bep(1,1,eye);  bep(2,1,body); bep(3,1,eye);  bep(4,1,body); bep(5,1,body);
      // Row 2
      bep(0,2,body); bep(1,2,body); bep(2,2,body); bep(3,2,body); bep(4,2,body); bep(5,2,body);
      // Row 3-4 body
      for (let c = 0; c <= 5; c++) { bep(c,3,body); bep(c,4,body); }
      // Row 5-6 legs (bigger boots)
      if (n.animFrame === 0) {
        bep(1,5,boot); bep(3,5,boot); bep(1,6,boot); bep(3,6,boot);
      } else {
        bep(0,5,boot); bep(2,5,boot); bep(1,6,boot); bep(4,6,boot);
      }

      // Draw a simple eye highlight
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(sx + Math.round((2 * S)), by + Math.round(1 * S), Math.max(1, S/2), Math.max(1, S/2));

      // Boss HP bar larger and centered
      if (settings.hpBars) {
        const bw = n.w + 8;
        ctx.fillStyle = '#c0392b';
        ctx.fillRect(sx - 4, by - 12, bw, 6);
        ctx.fillStyle = '#2ecc71';
        ctx.fillRect(sx - 4, by - 12, Math.max(0, bw * (n.hp / n.maxHp)), 6);
      }

      continue;
    }

    // ── TANK sprite (dark purple, 1.5x scale) ──
    if (n.isTank) {
      const S = Math.round(PIXEL * 1.5);
      const body = n.touching ? '#e74c3c' : '#6c2eb9';
      const eye  = '#f5c400';
      const boot = '#111122';
      function tp(col, row, color) {
        ctx.fillStyle = color;
        ctx.fillRect(sx + col * S, by + row * S, S, S);
      }
      // Head
      tp(1,0,body); tp(2,0,body); tp(3,0,body); tp(4,0,body);
      tp(0,1,body); tp(1,1,eye);  tp(2,1,body); tp(3,1,eye);  tp(4,1,body); tp(5,1,body);
      tp(0,2,body); tp(1,2,body); tp(2,2,body); tp(3,2,body); tp(4,2,body); tp(5,2,body);
      // Body (extra thick — 3 rows instead of 2)
      for(let c=0;c<=5;c++){ tp(c,3,body); tp(c,4,body); tp(c,5,body); }
      // Legs
      if (n.animFrame === 0) {
        tp(1,6,boot); tp(3,6,boot); tp(1,7,boot); tp(3,7,boot);
      } else {
        tp(0,6,boot); tp(2,6,boot); tp(1,7,boot); tp(4,7,boot);
      }
      // HP bar
      if (settings.hpBars) {
        const bw = n.w + 4;
        ctx.fillStyle = '#c0392b';
        ctx.fillRect(sx - 2, by - 7, bw, 4);
        ctx.fillStyle = '#9b59b6';
        ctx.fillRect(sx - 2, by - 7, Math.max(0, bw * (n.hp / n.maxHp)), 4);
      }
      continue;
    }

    // Flash red briefly when hit (hitFlash stored on npc)
    const S  = PIXEL;

    function ep(col, row, color) {
      ctx.fillStyle = color;
      ctx.fillRect(sx + col * S, by + row * S, S, S);
    }

    const body = n.touching ? '#e74c3c' : '#c0392b';
    const eye  = '#f5c400';
    const boot = '#222233';

    // Head
    ep(1,0,body); ep(2,0,body); ep(3,0,body); ep(4,0,body);
    ep(0,1,body); ep(1,1,eye);  ep(2,1,body); ep(3,1,eye);  ep(4,1,body); ep(5,1,body);
    ep(0,2,body); ep(1,2,body); ep(2,2,body); ep(3,2,body); ep(4,2,body); ep(5,2,body);
    // Body
    for(let c=0;c<=5;c++){ ep(c,3,body); ep(c,4,body); }
    // Legs animated
    if (n.animFrame === 0) {
      ep(1,5,boot); ep(3,5,boot); ep(1,6,boot); ep(3,6,boot);
    } else {
      ep(0,5,boot); ep(2,5,boot); ep(1,6,boot); ep(4,6,boot);
    }

    // HP bar (respects settings)
    if (settings.hpBars) {
      const bw = n.w + 4;
      ctx.fillStyle = '#c0392b';
      ctx.fillRect(sx - 2, by - 7, bw, 4);
      ctx.fillStyle = '#2ecc71';
      ctx.fillRect(sx - 2, by - 7, Math.max(0, bw * (n.hp / n.maxHp)), 4);
    }
  }
}

// ═══════════════════════════════════════════════════════════════
//  DEATH / RESPAWN
// ═══════════════════════════════════════════════════════════════
function killPlayer() {
  if (player.dead) return;
  player.dead    = true;
  player.deathX  = player.x;
  player.lives--;
  player.respawnTimer = 120; // 2 seconds

  // When out of bullets we also want to notify
  if ((player.bullets || 0) <= 0) showToast('OUT OF BULLETS — LIFE LOST');

  if (player.lives <= 0) {
    // Zone reset
    handleZoneFail();
  }
}

function respawnPlayer() {
  player.dead         = false;
  player.hp           = player.maxHp;
  player.bullets      = 20;
  player.isDashing    = false;
  player.dashTimer    = 0;
  player.dashCooldown = 0; // reset cooldown on respawn as a small mercy
  player.x            = Math.max(0, player.deathX - 80);
  player.y            = GROUND_Y - PLAYER_H;
  player.vx           = 0;
  player.vy           = 0;
  player.hitFlash     = 0;
}

function handleZoneFail() {
  // Find start of current zone (zones are 1-10, 11-20, etc.)
  const zoneStart = Math.floor((campaign.level - 1) / 10) * 10 + 1;
  campaign.level = zoneStart;
  campaign.lives = 3;
  campaign.hp    = campaign.maxHp;
  const best = parseInt(localStorage.getItem('bestRiels') || '0');
  if (campaign.riels > best) localStorage.setItem('bestRiels', campaign.riels);
  localStorage.setItem('activeCampaign', JSON.stringify(campaign));
  // Show game over screen then redirect
  gameState = 'game_over';
  stateTimer = 0;
}

// ═══════════════════════════════════════════════════════════════
//  SOUND (chunk 2 — basic gunshot using Web Audio)
// ═══════════════════════════════════════════════════════════════
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playGunshot() {
  try {
    const ac  = getAudio();
    const buf = ac.createBuffer(1, ac.sampleRate * 0.08, ac.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 3);
    }
    const src  = ac.createBufferSource();
    const gain = ac.createGain();
    src.buffer = buf;
    gain.gain.setValueAtTime(0.18, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.08);
    src.connect(gain); gain.connect(ac.destination);
    src.start();
  } catch {}
}

function playDeathSound() {
  try {
    const ac  = getAudio();
    const buf = ac.createBuffer(1, ac.sampleRate * 0.15, ac.sampleRate);
    const d   = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      const t = i / d.length;
      d[i] = (Math.random() * 2 - 1) * (1 - t) * 0.6 * Math.sin(t * 8);
    }
    const src  = ac.createBufferSource();
    const gain = ac.createGain();
    src.buffer = buf;
    gain.gain.setValueAtTime(0.22, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.15);
    src.connect(gain); gain.connect(ac.destination);
    src.start();
  } catch {}
}

// ═══════════════════════════════════════════════════════════════
//  DRAWING HELPERS
// ═══════════════════════════════════════════════════════════════
function wp(x) { return Math.round(x - camX); }  // world → screen x

function drawRect(wx, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(wp(wx), y, w, h);
}

// Pixel sprite helper (draws PIXEL-scaled blocks)
function sp(wx, y, px2, py, color) {
  ctx.fillStyle = color;
  ctx.fillRect(wp(wx) + px2 * PIXEL, y + py * PIXEL, PIXEL, PIXEL);
}

// ═══════════════════════════════════════════════════════════════
//  DRAW PLAYER SPRITE
// ═══════════════════════════════════════════════════════════════
function drawPlayer() {
  if (player.dead) {
    // Skull at death position
    drawSkull(player.deathX, player.y);
    return;
  }

  // Dash trail — ghost images behind player
  if (player.isDashing) {
    for (let t = 1; t <= 3; t++) {
      const trailX = player.x - player.dashVx * t * 2;
      ctx.globalAlpha = 0.15 * (4 - t);
      ctx.fillStyle = '#2255cc';
      ctx.fillRect(wp(trailX), player.y, PLAYER_W, PLAYER_H);
    }
    ctx.globalAlpha = 1;
  }

  // Hit flash — alternate transparency
  if (player.hitFlash > 0 && Math.floor(player.hitFlash / 3) % 2 === 0) {
    ctx.globalAlpha = 0.35;
  }

  const bx = player.x;
  const by = player.y;
  const S  = PIXEL;
  const f  = player.facingRight;

  function p(col, row, color) {
    // Mirror horizontally if facing left
    const drawCol = f ? col : (8 - col);
    ctx.fillStyle = color;
    ctx.fillRect(wp(bx) + drawCol * S, by + row * S, S, S);
  }

  const skin    = '#f5c89a';
  const hair    = '#222222';
  const jacket  = '#2255cc';
  const boot    = '#3d2b1f';
  const gunC    = '#888870';
  const barrel  = '#ccccaa';
  const flash   = '#f5c400';

  // Head
  p(2,0,hair); p(3,0,hair); p(4,0,hair);
  p(1,1,skin); p(2,1,skin); p(3,1,skin); p(4,1,skin); p(5,1,hair);
  p(1,2,skin); p(2,2,skin); p(3,2,'#111'); p(4,2,skin); p(5,2,skin);

  // Body
  for(let c=1;c<=5;c++){ p(c,3,jacket); p(c,4,jacket); }

  // Gun arm (always on right side of body = col 6+)
  p(6,3,skin); p(7,3,gunC); p(8,3,gunC);
  if (player.gunFlash > 0) { p(9,3,flash); p(9,2,flash); }

  // Legs
  const lf = player.animFrame;
  if (lf === 0) {
    p(2,5,jacket); p(3,5,jacket); p(4,5,jacket);
    p(2,6,boot);   p(4,6,boot);
    p(2,7,boot);   p(4,7,boot);
  } else if (lf === 1) {
    p(2,5,jacket); p(3,5,jacket); p(4,5,jacket);
    p(1,6,boot);   p(3,6,boot);
    p(1,7,boot);   p(4,7,boot);
  } else {
    p(2,5,jacket); p(3,5,jacket); p(4,5,jacket);
    p(2,6,boot);   p(4,6,boot);
    p(3,7,boot);   p(5,7,boot);
  }

  ctx.globalAlpha = 1;
}

// ═══════════════════════════════════════════════════════════════
//  SKULL SPRITE
// ═══════════════════════════════════════════════════════════════
function drawSkull(wx, y) {
  const S = PIXEL;
  function p(col, row, color) {
    ctx.fillStyle = color;
    ctx.fillRect(wp(wx) + col * S, y + row * S, S, S);
  }
  const w = '#e8e8d0', d = '#0a0e1a';
  p(1,0,w);p(2,0,w);p(3,0,w);
  p(0,1,w);p(1,1,d);p(2,1,w);p(3,1,d);p(4,1,w);
  p(0,2,w);p(1,2,w);p(2,2,w);p(3,2,w);p(4,2,w);
  p(1,3,w);p(2,3,d);p(3,3,w);
  p(1,4,w);p(2,4,w);p(3,4,w);
}

// ═══════════════════════════════════════════════════════════════
//  DRAW BACKGROUND + GROUND
// ═══════════════════════════════════════════════════════════════
function drawWorld() {
  // Sky
  ctx.fillStyle = '#0a0e1a';
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  // Pixel grid (parallax slow)
  ctx.fillStyle = 'rgba(245,196,0,0.04)';
  const gridSize = 32;
  const offX = (-camX * 0.3) % gridSize;
  for (let x = offX % gridSize; x < BASE_W; x += gridSize) ctx.fillRect(x, 0, 1, GROUND_Y);
  for (let y = 0; y < GROUND_Y; y += gridSize) ctx.fillRect(0, y, BASE_W, 1);

  // Far background pillars (parallax)
  ctx.fillStyle = 'rgba(20,26,50,0.9)';
  const pillarOff = (-camX * 0.2) % 120;
  for (let x = pillarOff % 120; x < BASE_W; x += 120) {
    ctx.fillRect(x, 0, 12, GROUND_Y);
  }

  // Platforms
  for (const p of platforms) {
    const sx = wp(p.x);
    if (sx > BASE_W || sx + p.w < 0) continue;
    ctx.fillStyle = '#1a2244';
    ctx.fillRect(sx, p.y, p.w, p.h);
    ctx.fillStyle = '#f5c400';
    ctx.fillRect(sx, p.y, p.w, 2);
    // pixel tile detail
    ctx.fillStyle = 'rgba(245,196,0,0.15)';
    for (let tx = sx; tx < sx + p.w; tx += 16) ctx.fillRect(tx, p.y + 2, 8, p.h - 2);
  }

  // Ground
  ctx.fillStyle = '#1a1e30';
  ctx.fillRect(0, GROUND_Y, BASE_W, FLOOR_H);
  ctx.fillStyle = '#f5c400';
  ctx.fillRect(0, GROUND_Y, BASE_W, 3);
  ctx.fillStyle = '#b8920a';
  ctx.fillRect(0, GROUND_Y + 3, BASE_W, 3);
  // Ground tile detail
  ctx.fillStyle = 'rgba(245,196,0,0.07)';
  const tOff = (-camX) % 32;
  for (let x = tOff % 32; x < BASE_W; x += 32) ctx.fillRect(x, GROUND_Y + 6, 16, FLOOR_H - 6);

  // Level end marker (right side of corridor)
  const endX = wp(LEVEL_WIDTH - 30);
  if (endX < BASE_W && endX > -30) {
    ctx.fillStyle = '#2ecc71';
    ctx.fillRect(endX, 0, 6, GROUND_Y);
    ctx.fillStyle = '#fff';
    ctx.font = '7px monospace';
    ctx.fillText('END', endX - 10, GROUND_Y - 10);
  }
}

// ═══════════════════════════════════════════════════════════════
//  DRAW BULLETS
// ═══════════════════════════════════════════════════════════════
function drawBullets() {
  for (const b of bullets) {
    const sx = wp(b.x);
    // Trail
    ctx.fillStyle = 'rgba(245,196,0,0.3)';
    ctx.fillRect(sx - b.dx * 8, b.y - b.dy * 8, 8, 3);
    // Bullet
    ctx.fillStyle = '#f5c400';
    ctx.fillRect(sx, b.y, 10, 3);
  }
}

function drawMagazines() {
  for (const m of magazines) {
    if (m.collected) continue;
    const sx = wp(m.x);
    if (sx < -40 || sx > BASE_W + 40) continue;
    ctx.fillStyle = '#444450';
    ctx.fillRect(sx, m.y, m.w, m.h);
    ctx.fillStyle = '#f5c400';
    ctx.fillRect(sx + 2, m.y + 2, m.w - 4, m.h - 4);
  }
}

function drawPowerups() {
  for (const p of powerups) {
    if (p.collected) continue;
    const sx = wp(p.x);
    if (sx < -40 || sx > BASE_W + 40) continue;
    if (p.type === 'jump') {
      ctx.fillStyle = '#8e44ad'; // purple
      ctx.fillRect(sx, p.y, p.w, p.h);
      ctx.fillStyle = '#f5c400';
      ctx.fillRect(sx + 2, p.y + 2, p.w - 4, p.h - 4);
      ctx.fillStyle = '#ffffff';
      ctx.font = '6px "Press Start 2P", monospace';
      ctx.fillText('J', sx + 3, p.y + 8);
    } else {
      ctx.fillStyle = '#27ae60'; // green
      ctx.fillRect(sx, p.y, p.w, p.h);
      ctx.fillStyle = '#f5c400';
      ctx.fillRect(sx + 2, p.y + 2, p.w - 4, p.h - 4);
      ctx.fillStyle = '#ffffff';
      ctx.font = '6px "Press Start 2P", monospace';
      ctx.fillText('S', sx + 3, p.y + 8);
    }
  }
}

// Navigate pause menu with arrow keys, confirm with Space/Enter
window.addEventListener('keydown', e => {

// ═══════════════════════════════════════════════════════════════
//  OVERLAY SCREENS
// ═══════════════════════════════════════════════════════════════
function drawOverlay() {
  if (gameState === 'playing') return;
  stateTimer++;

  const dimAlpha = Math.min(stateTimer / 30, 0.78);
  ctx.fillStyle  = `rgba(10,14,26,${dimAlpha})`;
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  if (stateTimer < 20) return;

  const cx = BASE_W / 2;
  const cy = BASE_H / 2;
  ctx.textAlign = 'center';

  if (gameState === 'waiting_for_host') {
    // Special waiting overlay for multiplayer when host is in shop
    drawBanner('WAITING FOR HOST...', '#f5c400', cx, cy - 10);
    ctx.font = '7px "Press Start 2P", monospace';
    ctx.fillStyle = '#888870';
    ctx.fillText('Host is in the shop. Stay put until they return.', cx, cy + 24);
    return;
  }

  if (gameState === 'level_clear') {
    drawBanner('LEVEL COMPLETE!', '#2ecc71', cx, cy);
    if (stateTimer > 90) proceedToShop();

  } else if (gameState === 'boss_slayed') {
    drawBanner('BOSS SLAYED!', '#f5c400', cx, cy);
    if (stateTimer > 35) {
      ctx.font      = '7px "Press Start 2P", monospace';
      ctx.fillStyle = '#2ecc71';
      ctx.fillText('MAX HP UP! NOW ' + player.maxHp, cx, cy + 50);
    }
    if (stateTimer > 120) proceedToShop();

  } else if (gameState === 'game_over') {
    drawBanner('GAME OVER', '#c0392b', cx, cy);
    if (stateTimer > 35) {
      ctx.font      = '7px "Press Start 2P", monospace';
      ctx.fillStyle = '#888870';
      ctx.fillText('RETURNING TO ZONE START...', cx, cy + 50);
    }
    if (stateTimer > 160) {
      localStorage.setItem('activeCampaign', JSON.stringify(campaign));
      window.location.href = 'level-select.html';
    }

  } else if (gameState === 'you_win') {
    drawBanner('YOU BEAT THE GAME!', '#f5c400', cx, cy - 20);
    if (stateTimer > 35) {
      ctx.font = '7px "Press Start 2P", monospace';
      ctx.fillStyle = '#e8e8d0';
      ctx.fillText('CONGRATULATIONS!', cx, cy + 24);
      ctx.fillStyle = '#888870';
      ctx.fillText('TOTAL RIELS: ' + campaign.riels + ' KHR', cx, cy + 44);
    }
    if (stateTimer > 220) {
      localStorage.setItem('activeCampaign', JSON.stringify(campaign));
      window.location.href = 'index.html';
    }
  }

  ctx.textAlign = 'left';
}

function drawBanner(text, color, cx, cy) {
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(cx - 230, cy - 38, 460, 54);
  ctx.fillStyle = color;
  ctx.fillRect(cx - 230, cy - 40, 460, 4);
  ctx.fillRect(cx - 230, cy + 16, 460, 4);
  const size = text.length > 14 ? '13px' : '17px';
  ctx.font      = `${size} "Press Start 2P", monospace`;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillText(text, cx + 3, cy + 3);
  ctx.fillStyle = color;
  ctx.fillText(text, cx, cy);
}

function proceedToShop() {
  if (gameState === '_transitioning') return;
  gameState = '_transitioning';
  campaign.hp        = Math.ceil(player.hp);
  campaign.maxHp     = player.maxHp;
  campaign.lives     = player.lives;
  campaign.gunDamage = player.gunDamage;
  // NOTE: level increment happens in shop.html when player clicks Continue
  const best = parseInt(localStorage.getItem('bestRiels') || '0');
  if (campaign.riels > best) localStorage.setItem('bestRiels', campaign.riels);
  try {
    const idx = parseInt(localStorage.getItem('activeCampaignIdx'));
    const all = JSON.parse(localStorage.getItem('rielrunner_campaigns')) || [];
    if (!isNaN(idx) && all[idx]) {
      all[idx] = { ...all[idx], ...campaign, lastPlayed: Date.now() };
      localStorage.setItem('rielrunner_campaigns', JSON.stringify(all));
    }
  } catch {}
  localStorage.setItem('activeCampaign', JSON.stringify(campaign));

  // If in multiplayer, mark room as inShop and preserve room in URL
  if (typeof MULTI_ROOM !== 'undefined' && MULTI_ROOM && mpDb && mpIsHost) {
    try { mpDb.ref('rooms/' + MULTI_ROOM + '/inShop').set(true); } catch(e){}
    window.location.href = 'shop.html?room=' + encodeURIComponent(MULTI_ROOM);
  } else {
    window.location.href = 'shop.html';
  }
}

// ═══════════════════════════════════════════════════════════════
//  INIT LASERS after platforms exist
// ═══════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════
//  TOUCH CONTROLS
// ═══════════════════════════════════════════════════════════════
(function initTouch() {
  // Read saved setting (if any). If the user explicitly set touchControls to true/false,
  // respect that. Otherwise enable on touch-capable devices only.
  const s = (() => {
    try { return JSON.parse(localStorage.getItem('rielrunner_settings')) || {}; }
    catch { return {}; }
  })();

  const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  let touchEnabled;
  if (Object.prototype.hasOwnProperty.call(s, 'touchControls')) {
    touchEnabled = !!s.touchControls; // respect explicit user preference
  } else {
    touchEnabled = isTouchDevice;     // default: enable on touch devices
  }
  if (!touchEnabled) return;

  // Force auto-aim on touch
  settings.autoAim = true;

  const overlay = document.getElementById('touch-overlay');
  overlay.classList.add('active');

  // Map button id → key code it simulates
  const BTN_KEY_MAP = {
    'btn-left':  'ArrowLeft',
    'btn-right': 'ArrowRight',
    'btn-jump':  'ArrowUp',
    'btn-shoot': 'Space',
    'btn-dash':  'ArrowDown',
  };

  function setKey(code, down) { keys[code] = down; }

  Object.entries(BTN_KEY_MAP).forEach(([id, code]) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('touchstart',  e => { e.preventDefault(); setKey(code, true);  el.classList.add('pressed');    }, { passive: false });
    el.addEventListener('touchend',    e => { e.preventDefault(); setKey(code, false); el.classList.remove('pressed'); }, { passive: false });
    el.addEventListener('touchcancel', e => {                     setKey(code, false); el.classList.remove('pressed'); }, { passive: false });
  });

  // Pause button
  const pauseBtn = document.getElementById('btn-pause');
  if (pauseBtn) {
    pauseBtn.addEventListener('touchstart', e => {
      e.preventDefault();
      pauseBtn.classList.add('pressed');
      if (gameState === 'playing')      { gameState = 'paused';  pauseMenuIndex = 0; }
      else if (gameState === 'paused')  { gameState = 'playing'; }
    }, { passive: false });
    pauseBtn.addEventListener('touchend', e => { e.preventDefault(); pauseBtn.classList.remove('pressed'); }, { passive: false });
  }

  // Canvas touch — handle pause menu item taps
  canvas.addEventListener('touchstart', e => {
    if (gameState !== 'paused') return;
    e.preventDefault();
    const rect   = canvas.getBoundingClientRect();
    const scaleX = BASE_W / rect.width;
    const scaleY = BASE_H / rect.height;
    const touch  = e.changedTouches[0];
    const tx = (touch.clientX - rect.left) * scaleX;
    const ty = (touch.clientY - rect.top)  * scaleY;

    // Match pause menu item hit areas (must mirror drawPauseMenu layout)
    const cx     = BASE_W / 2;
    const panelW = 380, panelH = 320;
    const panelX = cx - panelW / 2;
    const panelY = BASE_H / 2 - panelH / 2;

    PAUSE_ITEMS.forEach((item, i) => {
      const itemY  = panelY + 188 + i * 38;
      const hitX1  = panelX + 16;
      const hitX2  = panelX + panelW - 16;
      const hitY1  = itemY - 14;
      const hitY2  = itemY + 10;
      if (tx >= hitX1 && tx <= hitX2 && ty >= hitY1 && ty <= hitY2) {
        pauseMenuIndex = i;
        item.action();
      }
    });
  }, { passive: false });

  // Dash button — live cooldown countdown
  const dashBtn = document.getElementById('btn-dash');
  function updateDashBtn() {
    if (!dashBtn) return;
    if (player.dashCooldown > 0) {
      dashBtn.classList.add('cooldown');
      dashBtn.textContent = Math.ceil(player.dashCooldown / 60) + 'S';
    } else {
      dashBtn.classList.remove('cooldown');
      dashBtn.textContent = 'DASH';
    }
    requestAnimationFrame(updateDashBtn);
  }
  requestAnimationFrame(updateDashBtn);

  // Prevent scroll/zoom on canvas during touch
  const cv = document.getElementById('game-canvas');
  cv.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
  cv.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });
})();

generateLasers();
// Generate powerups for this level
function generatePowerups() {
  powerups.length = 0;
  // spawn 1-3 powerups per level (avoid boss levels)
  if (campaign.level > 0 && campaign.level % 10 === 0) return; // no powerups during boss levels
  const count = 1 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    let x, y;
    if (platforms.length > 0 && Math.random() < 0.7) {
      const p = platforms[Math.floor(Math.random() * platforms.length)];
      x = p.x + 8 + Math.random() * Math.max(0, p.w - 24);
      y = p.y - 10;
    } else {
      x = 400 + Math.random() * (LEVEL_WIDTH - 800);
      y = GROUND_Y - 16;
    }
    const type = Math.random() < 0.5 ? 'jump' : 'speed';
    powerups.push({ x, y, w: 12, h: 10, type, collected: false });
  }
}

// call now
generatePowerups();

// ═══════════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════════
function loop() {
  requestAnimationFrame(loop);
  frameCount++;

  if (gameState === 'playing') {
    // Host simulates other players based on inputs
    if (typeof MULTI_ROOM !== 'undefined' && MULTI_ROOM && mpDb && mpIsHost) {
      simulateOtherPlayers();
    }

    updatePlayer();
    updateBullets();
    updateNPCs();
    updateLasers();
    updateMagazines && updateMagazines();
    updatePowerups && updatePowerups();
  }

  // Host snapshot writing (after simulation, so snapshots reflect current state)
  if (typeof MULTI_ROOM !== 'undefined' && MULTI_ROOM && mpDb && mpIsHost) {
    if (frameCount % SNAPSHOT_FRAMES === 0) {
      try {
        const snap = {
          ts: Date.now(), frame: frameCount,
          campaignLevel: campaign.level,
          player: { x: player.x, y: player.y, hp: player.hp, maxHp: player.maxHp, bullets: player.bullets, lives: player.lives, facingRight: player.facingRight },
          npcs: npcs.map(n => ({ x: n.x, y: n.y, hp: n.hp, maxHp: n.maxHp, dead: n.dead, deadTimer: n.deadTimer, animFrame: n.animFrame, isBoss: n.isBoss, isTank: n.isTank, contactDamage: n.contactDamage, w: n.w, h: n.h })),
          magazines: magazines.map(m => ({ x: m.x, y: m.y, w: m.w, h: m.h, collected: !!m.collected })),
          powerups: powerups.map(p => ({ x: p.x, y: p.y, w: p.w, h: p.h, type: p.type, collected: !!p.collected })),
          lasers: lasers.map(l => ({ x: l.x, y: l.y, w: l.w, h: l.h })),
          bullets: bullets.map(b => ({ x: b.x, y: b.y, dx: b.dx, dy: b.dy, alive: !!b.alive })),
          otherPlayers: Object.values(otherPlayers).map(op => ({ uid: op.uid, x: op.x, y: op.y, hp: op.hp, bullets: op.bullets, lives: op.lives, facingRight: op.facingRight, animFrame: op.animFrame, gunFlash: op.gunFlash }))
        };
        mpDb.ref('rooms/' + MULTI_ROOM + '/snapshot').set(snap);
      } catch (e) { console.warn('snapshot write err', e); }
    }
  }

  drawWorld();
  drawLasers();
  drawBullets();
  drawMagazines();
  drawPowerups();
  drawNPCs();
  // Draw other players (clients) for host and clients
  drawOtherPlayers();
  drawPlayer();
  updateDrawRielParticles();
  updateDrawDmgNumbers();
  drawHUD();
  drawToast();
  drawOverlay();
  drawPauseMenu();
}

requestAnimationFrame(loop);
</script>
</body>
</html>
